# @package _global_
module:
  _target_: emg2qwerty.lightning.LSTMCTCModule
  in_features: 528  # freq * channels = (n_fft // 2 + 1) * 16
  mlp_features: [384]
  hidden_size: 96 # Number of lstm block per layer
  num_layers: 4   # Number of lstm layers
  batch_first: False
  bidirectional: True
  dropout: 0.4      # Probability % drop layer after lstm. Set to zero for no dropout layer


datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context
